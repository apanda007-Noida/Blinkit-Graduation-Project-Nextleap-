name: Data Pipeline Validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install emoji langdetect
        
    - name: Validate Scripts
      run: |
        # Run a basic syntax check on all scripts
        python -m py_compile src/ingestion.py
        python -m py_compile src/chunker.py
        python -m py_compile src/ai_tagger.py
        python -m py_compile src/normalize.py
        python -m py_compile src/aggregator.py
        python -m py_compile src/cleanup_exports.py
        
    - name: Run Aggregator (Test)
      run: |
        # Ensure that the aggregator can successfully parse the current dataset
        python src/aggregator.py
